<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/output.css" />
    <title>Age Calculator</title>
  </head>
  <body class="min-h-screen grid place-items-center bg-gray-100">
    <form
      class="mx-4 p-8 bg-white min-w-xl flex flex-col items-center rounded-xl"
    >
      <h3 class="text-5xl font-bold mb-2">Age Calculator</h3>
      <p class="text-xl font-bold text-center mt-6 mb-4">
        Enter you date of birth
      </p>
      <input
        id="birthDay"
        type="date"
        class="border-2 w-full p-1 px-2 rounded-lg"
      />
      <button
        type="button"
        class="p-2 px-6 bg-blue-600 text-white my-3 mx-auto block rounded-md"
        id="submitBtn"
      >
        Calculate Age
      </button>
      <p id="yearText" class="text-xl font-bold"></p>
    </form>
    <script src="./script.js"></script>
  </body>
</html>
