<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/output.css" />
    <title>Recipe Book App</title>
  </head>
  <body>
    <header class="bg-blue-950 text-4xl text-white p-6 font-bold text-center">
      <h1>Recipe Book App</h1>
    </header>
    <main class="max-w-7xl w-full flex justify-center py-6 mx-auto">
      <ul
        id="recipe-list"
        class="w-full flex mx-4 md:mx-0 flex-col items-center"
      >
        <li
          id="recipe-item"
          class="flex flex-col md:flex-row gap-4 md:gap-0 md:items-center md:justify-between mb-6 md:mb-0 shadow-md w-full max-w-5xl py-4"
        >
          <img
            src="https://spoonacular.com/recipeImages/12545-312x231.jpg"
            alt="recipe 1"
            class="w-full md:w-48 h-auto md:h-36 object-cover rounded"
          />

          <h3 class="text-xl font-bold">Recipe 1</h3>
          <p>
            <strong>Ingredients:</strong> Ingredient 1, Ingredient 2, Ingredient
            3
          </p>

          <a
            href="#"
            class="bg-blue-950 w-full md:w-auto text-center md:text-left px-4 py-2 md:pr-14 text-white font-bold uppercase rounded"
          >
            View Recipe
          </a>
        </li>
      </ul>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
