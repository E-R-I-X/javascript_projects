<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="./src/output.css" />
  </head>
  <body class="min-h-screen bg-gray-100 grid place-items-center">
    <form
      class="min-w-96 bg-white mx-4 w-full max-w-2xl p-6 flex flex-col text-center rounded-xl gap-4 shadow-lg"
    >
      <h1 class="text-4xl font-bold">Tip Calculator</h1>
      <p class="text-lg text-left">
        Enter the bill amount and tip percentage to calculate the total.
      </p>
      <label for="bill" class="text-lg text-left">Bill amount:</label>
      <input
        id="bill"
        type="number"
        min="0"
        class="w-full border-2 rounded-sm border-gray-300 p-2"
      />
      <label for="tip" class="text-lg text-left">Tip percentage:</label>
      <input
        id="tip"
        type="number"
        min="0"
        class="w-full border-2 rounded-sm border-gray-300 p-2"
      />

      <button
        type="button"
        id="calculateBtn"
        class="w-full px-4 py-2 bg-green-600 text-white text-xl font-bold rounded-md"
      >
        CALCULATE
      </button>
      <div class="flex items-center">
        <p class="font-bold text-left text-2xl">
          Total: <span id="total"></span>
        </p>
      </div>
    </form>
    <script src="script.js"></script>
  </body>
</html>
